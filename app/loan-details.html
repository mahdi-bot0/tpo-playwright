<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Details - TPO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .loan-details-container {
      border: 1px solid #ccc;
      padding: 30px;
      border-radius: 8px;
    }
    .detail-row {
      margin: 15px 0;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 4px;
    }
    .detail-label {
      font-weight: bold;
      color: #666;
      margin-bottom: 5px;
    }
    .detail-value {
      font-size: 1.2em;
      color: #333;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .back-link:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div data-testid="loan-details-container" class="loan-details-container">
    <h1>Loan Details</h1>

    <div class="detail-row">
      <div class="detail-label">Loan Amount</div>
      <div data-testid="loan-amount" class="detail-value" id="loanAmount">-</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Borrower Name</div>
      <div data-testid="borrower-name" class="detail-value" id="borrowerName">-</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Loan Status</div>
      <div data-testid="loan-status" class="detail-value" id="loanStatus">-</div>
    </div>

    <a href="/loans/upload" class="back-link">Upload Another Loan</a>
  </div>

  <script src="loan-details.js"></script>
</body>
</html>

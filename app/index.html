<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPO Loan Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .upload-page-container {
      border: 1px solid #ccc;
      padding: 30px;
      border-radius: 8px;
    }
    .drop-zone {
      border: 2px dashed #007bff;
      padding: 40px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      background: #f8f9fa;
    }
    .drop-zone:hover {
      background: #e9ecef;
    }
    button {
      padding: 10px 20px;
      margin: 10px 5px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .submit-button {
      background: #28a745;
      color: white;
    }
    .submit-button:hover:not(:disabled) {
      background: #218838;
    }
    .clear-button {
      background: #6c757d;
      color: white;
    }
    .selected-file-name {
      margin: 10px 0;
      color: #666;
    }
    .message {
      padding: 15px;
      margin: 20px 0;
      border-radius: 4px;
      display: none;
    }
    .success-message {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error-message {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .loading-spinner {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <div data-testid="upload-page-container" class="upload-page-container">
    <h1>Upload MISMO XML Loan File</h1>

    <input type="file" data-testid="file-input" id="fileInput" accept=".xml" />

    <div data-testid="drop-zone" class="drop-zone" id="dropZone">
      Drop MISMO XML file here or click to select
    </div>

    <div data-testid="selected-file-name" class="selected-file-name" id="selectedFileName"></div>

    <button data-testid="clear-file-button" class="clear-button" id="clearButton" style="display:none">Clear File</button>
    <button data-testid="submit-button" class="submit-button" id="submitButton" disabled>Submit</button>

    <div data-testid="loading-spinner" class="loading-spinner" id="loadingSpinner">
      <p>Processing...</p>
    </div>

    <div data-testid="success-message" class="message success-message" id="successMessage">
      File uploaded successfully!
    </div>

    <div data-testid="error-message" class="message error-message" id="errorMessage">
      Error uploading file. Please try again.
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
